<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Writing Assistant</title>
    <link rel="stylesheet" href="./taskpane.css" />
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <script defer src="./taskpane.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Word Review</p>
          <h1>Writing Assistant</h1>
        </div>
        <button id="scanButton" class="icon-button primary" type="button" title="Scan document" aria-label="Scan document">
          <span aria-hidden="true">↻</span>
        </button>
      </header>

      <section class="score-panel" aria-label="Writing score">
        <div class="score-ring">
          <span id="scoreValue">--</span>
        </div>
        <div class="score-copy">
          <strong id="scoreLabel">Ready</strong>
          <span id="statusText">Open a Word document and scan.</span>
        </div>
      </section>

      <nav class="tabs" aria-label="Suggestion filters">
        <button class="tab active" type="button" data-filter="all">All <span id="allCount">0</span></button>
        <button class="tab" type="button" data-filter="spelling">Spelling <span id="spellingCount">0</span></button>
        <button class="tab" type="button" data-filter="grammar">Grammar <span id="grammarCount">0</span></button>
      </nav>

      <section id="suggestionList" class="suggestions" aria-live="polite"></section>

      <section id="emptyState" class="empty-state">
        <div class="empty-mark">✓</div>
        <strong>No suggestions yet</strong>
        <span>Scan the document to review each paragraph.</span>
      </section>

      <footer class="settings">
        <label class="toggle">
          <input id="onlineToggle" type="checkbox" checked />
          <span>LanguageTool</span>
        </label>
        <select id="languageSelect" aria-label="Language">
          <option value="en-US">English (US)</option>
          <option value="en-GB">English (UK)</option>
          <option value="en-AU">English (AU)</option>
          <option value="en-CA">English (CA)</option>
        </select>
      </footer>
    </main>
  </body>
</html>
